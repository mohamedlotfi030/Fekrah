<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | فكرة</title>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body style="background:#000; color:#fff; padding:40px 5%;">
    <div style="max-width:500px; margin:0 auto; background:#111; padding:30px; border-radius:15px; border:1px solid #333;">
        <h2 style="color:#00bcd4; text-align:center;">بيانات العميل</h2>
        <p style="text-align:center; color:#888;">برجاء إدخال الاسم ورقم الهاتف لإرسال الطلب</p>
        
        <input type="text" id="name" placeholder="الاسم بالكامل" class="input-field" style="width:100%; margin:20px 0 10px; padding:15px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
        <input type="tel" id="phone" placeholder="رقم الواتساب" class="input-field" style="width:100%; margin-bottom:30px; padding:15px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
        
        <button onclick="confirmOrder()" class="btn-main" style="width:100%; padding:15px; font-size:1.1rem;">تأكيد الطلب عبر واتساب</button>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#888; text-decoration:none;">العودة للمتجر</a>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>
    <script>
        function confirmOrder() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            if(!n || !p) return alert("برجاء ملء البيانات أولاً");
            API.sendOrder(n, p);
        }
    </script>
</body>
</html>
