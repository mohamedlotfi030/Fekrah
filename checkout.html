<style>
    .checkout-container { 
        max-width: 500px; 
        margin: 60px auto; 
        background: #111; 
        padding: 40px 30px; 
        border-radius: 15px; 
        border: 1px solid #333; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .btn-wa { 
        background: #25d366 !important; 
        color: #fff !important; 
        margin-bottom: 15px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 10px; 
        width: 100%; 
        border: none;
        padding: 15px;
        font-size: 1.1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-sheet { 
        background: #00bcd4 !important; 
        color: #000 !important; 
        width: 100%; 
        border: none; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 10px;
        padding: 15px;
        font-size: 1.1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 30px;
        color: #888;
        text-decoration: none;
        transition: 0.3s;
        font-size: 0.95rem;
        border-top: 1px solid #222;
        padding-top: 20px;
    }
    .back-link:hover { color: #00bcd4; }
    .loading-overlay { display:none; text-align:center; padding:20px; color:#00bcd4; }
    
    /* تنسيق الهيدر داخل صفحة الدفع */
    .header {
        display: flex;
        justify-content: center; /* تمركز اللوجو في صفحة الدفع */
        padding: 20px;
        background: #111;
        border-bottom: 1px solid #333;
    }

    /* البوب أب */
    .popup {
        position: fixed;
        top:0; left:0;
        width:100%; height:100%;
        background: rgba(0,0,0,0.7);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:9999;
    }
    .popup-content {
        background:#111;
        padding:20px;
        border-radius:8px;
        text-align:center;
        color:#fff;
        max-width: 400px;
        width: 90%;
    }
    .popup-content input {
        padding:10px;
        margin:10px 0;
        width:80%;
        border-radius:6px;
        border:1px solid #333;
        background:#000;
        color:#fff;
    }
    .popup-content button {
        background:#00bcd4;
        border:none;
        padding:10px 20px;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
    }
</style>
</head>
<body style="background:#000; color:#fff; padding: 0;">

    <header class="header">
        <div class="logo">
            <img src="logo-main.png" alt="فكرة" style="height: 50px; cursor: pointer;" onclick="location.href='index.html'">
        </div>
    </header>

    <div class="checkout-container">
        <h2 style="text-align:center; margin-bottom:30px; color: #00bcd4;">تأكيد الطلب</h2>
        
        <div id="formSection">
            <input type="text" id="custName" placeholder="الاسم بالكامل" class="input-field" style="margin-bottom:15px; width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
            <input type="tel" id="custPhone" placeholder="رقم الموبايل (واتساب)" class="input-field" style="margin-bottom:25px; width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">

            <button onclick="handleOrder('whatsapp')" class="btn-wa">
                <i class="fab fa-whatsapp"></i> طلب عبر واتساب
            </button>

            <button onclick="handleOrder('sheet')" class="btn-sheet">
                <i class="fas fa-paper-plane"></i> تقديم الطلب (بريد إلكتروني)
            </button>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية (المتجر)
            </a>
        </div>

        <div id="loading" class="loading-overlay">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p>جاري إرسال طلبك إلى فكرة...</p>
        </div>
    </div>

    <!-- البوب أب لرقم الهاتف الإضافي -->
    <div id="phonePopup" class="popup">
      <div class="popup-content">
        <h3>أدخل رقم هاتف إضافي للتواصل</h3>
        <input type="tel" id="extraPhone" placeholder="رقم الهاتف أو واتساب">
        <button onclick="confirmPhone()">تأكيد</button>
      </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function handleOrder(method) {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;

            if(!name || !phone) {
                alert("يرجى إدخال الاسم ورقم الهاتف لإكمال الطلب");
                return;
            }

            if(method === 'whatsapp') {
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                API.sendOrderWhatsApp(name, phone);
            } else {
                // عند اختيار البريد يظهر البوب أب
                document.getElementById('phonePopup').style.display = 'flex';
            }
        }

        async function confirmPhone() {
            const extraPhone = document.getElementById('extraPhone').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;

            if(!extraPhone || extraPhone.length < 10) {
                alert("من فضلك أدخل رقم صحيح للتواصل");
                return;
            }

            document.getElementById('phonePopup').style.display = 'none';
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const success = await API.submitToSheet(name, phone + " | رقم إضافي: " + extraPhone);
            if(success) {
                alert("تم استلام طلبك بنجاح! سنتواصل معك قريباً.");
                localStorage.removeItem('fekra_cart');
                window.location.href = 'index.html';
            } else {
                alert("عذراً، حدث خطأ. يرجى المحاولة مرة أخرى.");
                document.getElementById('formSection').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
