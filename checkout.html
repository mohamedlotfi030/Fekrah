<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | فكرة</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <style>
        .checkout-container { max-width: 500px; margin: 40px auto; background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .btn-wa { background: #25d366 !important; color: #fff !important; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        .btn-sheet { background: #00bcd4 !important; color: #000 !important; width: 100%; }
        .back-home { display: block; text-align: center; margin-top: 25px; color: #888; text-decoration: none; transition: 0.3s; }
        .back-home:hover { color: #00bcd4; }
    </style>
</head>
<body style="background:#000; color:#fff; padding: 20px;">

    <div class="checkout-container">
        <h2 style="text-align:center; margin-bottom:25px; color: #00bcd4;">تأكيد الطلب</h2>
        
        <div id="formSection">
            <input type="text" id="custName" placeholder="الاسم بالكامل" class="input-field" style="margin-bottom:15px;">
            <input type="tel" id="custPhone" placeholder="رقم الموبايل (واتساب)" class="input-field" style="margin-bottom:25px;">

            <button onclick="handleOrder('whatsapp')" class="btn-main btn-wa">
                 طلب عبر واتساب
            </button>

            <button onclick="handleOrder('sheet')" class="btn-main btn-sheet">
                تقديم الطلب (رسمي)
            </button>

            <a href="index.html" class="back-home">
                 العودة للصفحة الرئيسية
            </a>
        </div>

        <div id="loading" style="display:none; text-align:center; padding:20px; color:#00bcd4;">
            جاري معالجة طلبك...
        </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function handleOrder(method) {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;

            if(!name || !phone) {
                alert("يرجى إدخال الاسم ورقم الهاتف");
                return;
            }

            document.getElementById('formSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            if(method === 'whatsapp') {
                API.sendOrderWhatsApp(name, phone);
            } else {
                const success = await API.submitToSheet(name, phone);
                if(success) {
                    alert("تم استلام طلبك بنجاح، وسنتواصل معك قريباً.");
                    localStorage.removeItem('fekra_cart');
                    window.location.href = 'index.html';
                } else {
                    alert("حدث خطأ، يرجى المحاولة لاحقاً.");
                    document.getElementById('formSection').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
