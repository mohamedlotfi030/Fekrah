<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | حلوان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/styles/style.css">
    <style>
        /* إضافة طبقة تعتيم خلف السلة */
        .cart-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1500;
            display: none;
        }
        .cart-overlay.active { display: block; }
        
        /* ضبط السلة لتكون فوق كل شيء */
        .cart-drawer {
            position: fixed;
            right: -320px; /* مخفية */
            top: 0; width: 300px; height: 100%;
            background: #111;
            z-index: 2000;
            transition: 0.3s ease;
            border-left: 1px solid #333;
        }
        .cart-drawer.active { right: 0; }
    </style>
</head>
<body>

    <div id="cartOverlay" class="cart-overlay" onclick="UI.toggleCart(false)"></div>

    <header class="header">
        <div class="logo">
            <img src="logo-main.png" alt="فكرة" style="height: 45px;">
        </div>
        <nav class="nav-group">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <div id="cartTrigger" onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
                <span>السلة</span>
            </div>
        </nav>
    </header>

    <main id="productsGrid" class="grid"></main>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header" style="padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between;">
            <h3 style="margin:0; color:#fff;">سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="cursor:pointer; color:#fff; font-size: 2rem;">&times;</span>
        </div>
        <div id="cartItemsList" style="padding: 15px; overflow-y: auto; height: calc(100% - 160px);"></div>
        <div style="padding: 20px; border-top: 1px solid #333;">
            <button onclick="window.location.href='checkout.html'" class="btn-main" style="width: 100%; margin:0;">مراجعة وإتمام الطلب</button>
        </div>
    </div>

    <footer class="fixed-footer">
        <a href="tel:01111049778" class="footer-item"><i class="fas fa-phone-alt"></i><span>اتصال</span></a>
        <a href="https://wa.me/201111049778" class="footer-item"><i class="fab fa-whatsapp"></i><span>واتساب</span></a>
        <a href="mailto:mohamedlotfi030@gmail.com" class="footer-item"><i class="fas fa-envelope"></i><span>إيميل</span></a>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof Cart !== 'undefined') Cart.init();
            
            const grid = document.getElementById('productsGrid');
            if(grid && typeof Products !== 'undefined') {
                Object.keys(Products).forEach(key => {
                    const p = Products[key];
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-img-container"><img src="${p.images[0]}"></div>
                            <h3>${p.name}</h3>
                            <a href="product-details.html?type=${key}" class="btn-main">اطلب الآن</a>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
