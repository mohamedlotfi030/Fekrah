<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فكرة للدعاية والإعلان</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo"><img src="logo.png.png"></div>
        <nav class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="#contact">تواصل معنا</a>
        </nav>
        <div class="cart-icon" onclick="toggleCart(true)" style="cursor:pointer;">
            <i class="fas fa-shopping-cart"></i> <span id="cartBadge">0</span>
        </div>
    </header>

    <section class="grid" id="mainGrid">
        </section>

    <section id="contact" class="contact-sec">
        <h2 style="text-align:center; color:var(--primary);">تواصل معنا</h2>
        <div class="contact-grid">
            <div class="contact-item"><h3>العنوان</h3><p>44 شارع محمود خاطر - حلوان</p></div>
            <div class="contact-item"><h3>الهاتف</h3><p>01275209778</p></div>
        </div>
    </section>

    <div id="sidebar" class="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>سلة الطلبات</h3>
            <span onclick="toggleCart(false)" style="cursor:pointer; font-size:2rem;">&times;</span>
        </div>
        <div id="cartItemsList"></div>
        
        <div id="checkoutFormContainer" style="display:none; margin-top:20px; border-top:1px solid #333; pt:20px;">
            <input type="text" id="userName" placeholder="الاسم بالكامل">
            <input type="tel" id="userPhone" placeholder="رقم الهاتف">
            <textarea id="userNotes" placeholder="ملاحظات الطلب"></textarea>
            
            <div style="display:flex; gap:10px;">
                <button onclick="submitToSheet()" id="sheetBtn" class="btn-order" style="background:var(--primary); color:black;">عبر الموقع</button>
                <button onclick="submitToWhatsApp()" class="btn-order" style="background:#25d366; color:white;">عبر واتساب</button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/201111049778" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>

    <script src="script.js"></script>
</body>
</html>
