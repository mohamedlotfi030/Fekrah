    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --secondary: #0099cc;
            --dark: #0a0a0a;
            --darker: #050505;
            --light: #ffffff;
            --gray: #1a1a1a;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--dark); 
            color: var(--light); 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }
        header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000; 
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(0, 212, 255, 0.1); 
        }
        nav { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-size: 1.8rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--light); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        
        .hero { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding-top: 100px; 
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, var(--dark) 70%); 
        }
        .cta-button { 
            display: inline-block; 
            padding: 1rem 2.5rem; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: var(--darker); 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 700; 
            transition: 0.3s; 
            border: none; 
            cursor: pointer; 
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
        }
        .section-title { text-align: center; margin-bottom: 3rem; }
        .section-title h2 { font-size: 2.5rem; border-bottom: 3px solid var(--primary); display: inline-block; padding-bottom: 10px; }

        .portfolio { padding: 5rem 2rem; background: var(--darker); }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .portfolio-item { border-radius: 15px; overflow: hidden; height: 300px; border: 1px solid rgba(0, 212, 255, 0.1); background: #111; }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .portfolio-item:hover img { transform: scale(1.1); }

        .contact-section { padding: 5rem 2rem; background: var(--dark); }
        .contact-container { max-width: 1000px; margin: 0 auto 4rem auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .contact-card { background: var(--gray); padding: 2rem; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; transition: 0.3s; text-decoration: none; color: var(--light); display: block;}
        .contact-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .contact-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem; }
        
        .form-container { max-width: 700px; margin: 0 auto; background: var(--gray); padding: 3rem; border-radius: 15px; border: 1px solid rgba(0, 212, 255, 0.1); }
        input, select, textarea { width: 100%; padding: 1rem; margin-bottom: 1.5rem; border-radius: 8px; border: 1px solid #333; background: var(--dark); color: var(--light); font-family: 'Tajawal', sans-serif; }
        
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; z-index: 1000; }
        footer { padding: 2rem; text-align: center; background: var(--darker); }
    </style>
</head>
