<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | حلوان</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تنسيقات إضافية لضمان الثبات */
        body { background-color: #000; color: #fff; margin: 0; padding-bottom: 70px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #111; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .logo img { height: 45px; }
        .nav-group { display: flex; gap: 20px; align-items: center; }
        .nav-link { color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .nav-link i { font-size: 1.2rem; margin-bottom: 4px; color: #00bcd4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 30px 5%; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; text-align: center; border: 1px solid #333; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img-container { background: #fff; height: 220px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .card-img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .card h3 { padding: 15px; margin: 0; font-size: 1.1rem; }
        .btn-main { display: block; background: #00bcd4; color: #000; text-decoration: none; padding: 12px; margin: 15px; border-radius: 8px; font-weight: bold; }
        .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .footer-item { color: #fff; text-decoration: none; text-align: center; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; }
        .footer-item i { font-size: 1.3rem; margin-bottom: 5px; color: #00bcd4; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #ff4444; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="logo-main.png" alt="فكرة">
        </div>
        <nav class="nav-group">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="tel:01111049778" class="nav-link">
                <i class="fas fa-phone-alt"></i>
                <span>اتصل بنا</span>
            </a>
            <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
                <span>السلة</span>
            </div>
        </nav>
    </header>

    <main id="productsGrid" class="grid">
        </main>

    <footer class="fixed-footer">
        <a href="tel:01111049778" class="footer-item">
            <i class="fas fa-phone-alt"></i>
            <span>اتصال</span>
        </a>
        <a href="https://wa.me/201111049778" class="footer-item">
            <i class="fab fa-whatsapp"></i>
            <span>واتساب</span>
        </a>
        <a href="mailto:mohamedlotfi030@gmail.com" class="footer-item">
            <i class="fas fa-envelope"></i>
            <span>الإيميل</span>
        </a>
        <a href="https://maps.google.com/?q=حلوان" target="_blank" class="footer-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>موقعنا</span>
        </a>
    </footer>

    <div id="cartDrawer" class="cart-drawer" style="position:fixed; right:-100%; top:0; width:300px; height:100%; background:#1a1a1a; transition:0.3s; z-index:2000; border-left:1px solid #333;">
        <div class="drawer-header" style="padding:20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333;">
            <h3>سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="cursor:pointer; font-size:2rem;">&times;</span>
        </div>
        <div id="cartItemsList" style="padding:20px; height:calc(100% - 150px); overflow-y:auto;"></div>
        <div style="padding:20px;">
            <button onclick="window.location.href='checkout.html'" class="btn-main" style="width:100%; margin:0;">إتمام الطلب</button>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof Cart !== 'undefined') Cart.init();
            
            const grid = document.getElementById('productsGrid');
            if(grid && typeof Products !== 'undefined') {
                Object.keys(Products).forEach(key => {
                    const p = Products[key];
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-img-container">
                                <img src="${p.images[0]}" alt="${p.name}">
                            </div>
                            <h3>${p.name}</h3>
                            <a href="product-details.html?type=${key}" class="btn-main">اطلب الآن</a>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
