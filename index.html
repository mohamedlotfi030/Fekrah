<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | Fekrah Advertising</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --dark: #0a0a0a; --light: #ffffff; --gray: #1a1a1a; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: var(--light); margin: 0; scroll-behavior: smooth; }
        header { padding: 1.5rem; background: #000; border-bottom: 2px solid var(--primary); text-align: center; position: sticky; top: 0; z-index: 1000; }
        .hero { padding: 4rem 1rem; text-align: center; background: linear-gradient(to bottom, #001a2e, #0a0a0a); }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .portfolio-item { border-radius: 12px; overflow: hidden; border: 1px solid #333; height: 250px; background: #111; position: relative; }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .portfolio-item:hover img { transform: scale(1.1); }
        
        .contact-section { padding: 4rem 1.5rem; background: var(--gray); text-align: center; border-top: 1px solid #333; }
        .contact-container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .contact-card { background: var(--dark); padding: 2rem; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .contact-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .contact-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem; }
        .contact-card h3 { margin-bottom: 0.5rem; }
        .contact-card p, .contact-card a { color: #ccc; text-decoration: none; font-size: 1.1rem; word-break: break-all; }
        
        .btn { background: var(--primary); color: #000; padding: 0.8rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 1rem; transition: 0.3s; border: none; cursor: pointer; }
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        footer { padding: 2rem; text-align: center; background: #000; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.8rem;">فكرة للدعاية والإعلان</h1>
</header>

<section class="hero">
    <h1>من الخيال إلى الواقع</h1>
    <p>حلول مبتكرة لنمو علامتك التجارية</p>
    <a href="#contact" class="btn">تواصل معنا الآن</a>
</section>

<div class="portfolio-grid">
    <div class="portfolio-item"><img src="outdoor-etisalat.jpg" alt="Etisalat"></div>
    <div class="portfolio-item"><img src="outdoor-gazprom.jpg" alt="Gazprom"></div>
    <div class="portfolio-item"><img src="outdoor-sigma.jpg" alt="Sigma"></div>
    <div class="portfolio-item"><img src="giveaway-betek.jpg" alt="Betek"></div>
    <div class="portfolio-item"><img src="giveaway-office.jpg" alt="Office"></div>
    <div class="portfolio-item"><img src="giveaway-usb.jpg" alt="USB"></div>
</div>

<section id="contact" class="contact-section">
    <h2 style="font-size: 2.5rem; margin-bottom: 3rem; color: var(--primary);">قنوات التواصل</h2>
    <div class="contact-container">
        
        <div class="contact-card">
            <i class="fas fa-phone-alt"></i>
            <h3>اتصل بنا</h3>
            <p dir="ltr"><a href="tel:+201111049778">0111 104 9778</a></p>
        </div>

        <div class="contact-card">
            <i class="fas fa-envelope"></i>
            <h3>البريد الإلكتروني</h3>
            <p><a href="mailto:Fekrah_marketing@outlook.com">Fekrah_marketing@outlook.com</a></p>
        </div>

        <div class="contact-card">
            <i class="fab fa-whatsapp"></i>
            <h3>واتساب</h3>
            <p><a href="https://wa.me/201111049778">أرسل رسالة مباشرة</a></p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 فكرة للدعاية والإعلان - جميع الحقوق محفوظة</p>
</footer>

<a href="https://wa.me/201111049778" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

</body>
</html>
