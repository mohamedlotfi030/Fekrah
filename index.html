<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | الرئيسية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="logo.png.png" alt="فكرة">
        </div>
        <nav class="nav-links">
            <a href="index.html" class="active">الرئيسية</a>
            <a href="#contact">تواصل معنا</a>
        </nav>
        <div class="cart-icon" onclick="toggleCart(true)">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </header>

    <section class="grid">
        <div class="card">
            <div class="card-img-container"><img src="T-shirt.png"></div>
            <div class="card-details">
                <h3>تيشيرتات</h3>
                <a href="product-details.html?type=tshirt" class="btn">اطلب الآن</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img-container"><img src="rollup-1.jpg"></div>
            <div class="card-details">
                <h3>رول أب ستاند</h3>
                <a href="product-details.html?type=rollup" class="btn">اطلب الآن</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img-container"><img src="x-banr.jpg"></div>
            <div class="card-details">
                <h3>إكس بانر</h3>
                <a href="product-details.html?type=xbanr" class="btn">اطلب الآن</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img-container"><img src="B-card.jpg"></div>
            <div class="card-details">
                <h3>كروت شخصية</h3>
                <a href="product-details.html?type=bcard" class="btn">اطلب الآن</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img-container"><img src="mug.jpg"></div>
            <div class="card-details">
                <h3>المج الحراري</h3>
                <a href="product-details.html?type=mug" class="btn">اطلب الآن</a>
            </div>
        </div>

        <div class="card">
            <div class="card-img-container"><img src="Car Sunshad.jpeg"></div>
            <div class="card-details">
                <h3>شمسية سيارة</h3>
                <a href="product-details.html?type=carsunshade" class="btn">اطلب الآن</a>
            </div>
        </div>
    </section>

    <section id="contact" class="contact-sec">
        <h2>تواصل معنا</h2>
        <div class="contact-grid">
            <div class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <h3>العنوان</h3>
                <p>44 شارع محمود خاطر - حلوان - القاهرة</p>
            </div>
            <div class="contact-item">
                <i class="fas fa-phone"></i>
                <h3>الهاتف</h3>
                <p dir="ltr">01275209778</p>
            </div>
        </div>
    </section>

    <div id="sidebar" class="cart-sidebar">
        <div class="sidebar-header">
            <h3>سلة الطلبات</h3>
            <span onclick="toggleCart(false)" class="close-btn">&times;</span>
        </div>
        <div id="cartItemsList"></div>
        
        <div id="checkoutFormContainer" class="checkout-form" style="display:none;">
            <input type="text" id="userName" placeholder="الاسم بالكامل">
            <input type="tel" id="userPhone" placeholder="رقم الهاتف">
            <textarea id="userNotes" placeholder="أي ملاحظات إضافية"></textarea>
            <div class="order-btns">
                <button onclick="submitToSheet()" id="sheetBtn" class="btn-sheet">عبر الموقع</button>
                <button onclick="submitToWhatsApp()" class="btn-wa">عبر واتساب</button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/201111049778" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
