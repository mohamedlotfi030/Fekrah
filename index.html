<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | حلوان</title>
    
    <link rel="icon" type="image/png" href="logo-main.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/styles/style.css">
    <style>
        /* تأكيد ثبات الصور في الرئيسية وعدم تحركها */
        .card-img-container img {
            transition: none !important;
            opacity: 1 !important;
        }
        /* سلاسة التمرير عند الضغط على تواصل معنا */
        html {
            scroll-behavior: smooth;
        }
        /* تنسيق إضافي لضمان ظهور اللوجو بشكل جيد في الهيدر */
        .logo img {
            height: 45px;
            width: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div id="cartOverlay" class="cart-overlay" onclick="UI.toggleCart(false)"></div>

    <header class="header">
        <div class="logo">
            <img src="logo-main.png" alt="فكرة للدعاية والإعلان">
        </div>
        <nav class="nav-group">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="#contact-section" class="nav-link">
                <i class="fas fa-address-book"></i>
                <span>تواصل معنا</span>
            </a>
            <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
                <span>السلة</span>
            </div>
        </nav>
    </header>

    <main id="productsGrid" class="grid">
    </main>

    <!-- قسم عملاؤنا -->
    <section id="clients" style="padding:60px 5%; background:#0a0a0a; color:#fff;">
      <h2 style="text-align:center; color:#00bcd4; margin-bottom:40px;">بعض عملائنا</h2>
      <div class="clients-slider">
        <div class="slide-track">
          <div class="client-logo"><img src="assets/images/client1.png" alt="عميل 1"></div>
          <div class="client-logo"><img src="assets/images/client2.png" alt="عميل 2"></div>
          <div class="client-logo"><img src="assets/images/client3.png" alt="عميل 3"></div>
          <div class="client-logo"><img src="assets/images/client4.png" alt="عميل 4"></div>
          <div class="client-logo"><img src="assets/images/client5.png" alt="عميل 5"></div>
        </div>
      </div>
    </section>

    <section id="contact-section" style="padding: 60px 5%; background: #0a0a0a; border-top: 1px solid #222;">
        <h2 style="text-align: center; color: #00bcd4; margin-bottom: 40px; font-size: 2rem;">طرق التواصل</h2>
        <div class="grid">
            <div class="card" style="padding: 30px; text-align: center;">
                <i class="fab fa-whatsapp" style="font-size: 3.5rem; color: #25d366; margin-bottom: 15px;"></i>
                <h3>واتساب</h3>
                <p style="color: #888; margin-bottom: 20px;">أرسل استفساراتك وملفاتك مباشرة</p>
                <a href="https://wa.me/201111049778" class="btn-main" style="margin: 0 auto;">مراسلة</a>
            </div>
            <div class="card" style="padding: 30px; text-align: center;">
                <i class="fas fa-phone-volume" style="font-size: 3.5rem; color: #00bcd4; margin-bottom: 15px;"></i>
                <h3>اتصال هاتفي</h3>
                <p style="color: #888; margin-bottom: 20px;">متاحون للرد على مكالماتكم</p>
                <a href="tel:01111049778" class="btn-main" style="margin: 0 auto;">اتصل الآن</a>
            </div>
            <div class="card" style="padding: 30px; text-align: center;">
                <i class="fas fa-map-marked-alt" style="font-size: 3.5rem; color: #ff4444; margin-bottom: 15px;"></i>
                <h3>موقعنا</h3>
                <p style="color: #888; margin-bottom: 20px;">حلوان، القاهرة - تشرفنا بزيارتك</p>
                <a href="https://maps.google.com" target="_blank" class="btn-main" style="margin: 0 auto;">الخريطة</a>
            </div>
        </div>
    </section>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <h3 style="margin:0; color:#fff;">سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="cursor:pointer; color:#fff; font-size: 2.5rem;">×</span>
        </div>
        <div id="cartItemsList" style="padding: 15px; overflow-y: auto; flex: 1;">
        </div>
        <div style="padding: 20px; border-top: 1px solid #333;">
            <button onclick="window.location.href='checkout.html'" class="btn-main" style="width: 100%; margin:0;">إتمام الطلب</button>
        </div>
    </div>

    <footer style="padding:20px; text-align:center; background:#000; color:#888;">
      © جميع الحقوق محفوظة لدى فكرة للدعاية والإعلان 2026
    </footer>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // تشغيل نظام السلة
            if(typeof Cart !== 'undefined') Cart.init();
            
            const grid = document.getElementById('productsGrid');
            if(grid && typeof Products !== 'undefined') {
                // عرض المنتجات في الرئيسية بصور ثابتة
                Object.keys(Products).forEach(key => {
                    const p = Products[key];
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-img-container">
                                <img src="${p.images[0]}" alt="${p.name}">
                            </div>
                            <h3>${p.name}</h3>
                            <a href="product-details.html?type=${key}" class="btn-main">اطلب الآن</a>
                        </div>`;
                });
            }

            // تحديد الصور في قسم عملاؤنا
            const logos = document.querySelectorAll('.client-logo');
            logos.forEach(logo => {
              logo.addEventListener('click', () => {
                logos.forEach(l => l.classList.remove('selected'));
                logo.classList.add('selected');
              });
            });
        });
    </script>
</body>
</html>
