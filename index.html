<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معرض الأعمال الحقيقية | فكرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 100px;">
    
    <header class="main-header">
        <div class="logo"><img src="logo.png.png" alt="فكرة"></div>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="gallery.html" style="color: var(--primary);">المعرض</a></li>
            </ul>
        </nav>
    </header>

    <div style="text-align: center; padding: 50px;">
        <h1>أعمالنا الحقيقية</h1>
        <p style="color: var(--gray-text);">جودة التنفيذ تحكي قصتنا</p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 5%;">
        
        <div style="background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333;">
            <img src="T-shirt.png" style="width: 100%; height: 300px; object-fit: cover;">
            <div style="padding: 15px;">
                <h4 style="margin: 0;">تيشيرت Rhythm Express الحقيقي</h4>
                <p style="color: var(--gray-text); font-size: 0.8rem;">نوع العمل: طباعة منسوجات</p>
            </div>
        </div>

        <div style="background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333;">
            <img src="B-card.jpg" style="width: 100%; height: 300px; object-fit: cover;">
            <div style="padding: 15px;">
                <h4 style="margin: 0;">كروت شخصية فاخرة</h4>
                <p style="color: var(--gray-text); font-size: 0.8rem;">نوع العمل: مطبوعات ورقية</p>
            </div>
        </div>

    </div>
</body>
</html>
