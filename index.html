<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | حلوان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/styles/style.css">
    <style>
        /* إصلاحات سريعة لضمان ظهور السلة والكروت */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9998; display: none; }
        .cart-overlay.active { display: block; }
        .cart-drawer { position: fixed; top: 0; right: -350px; width: 320px; height: 100%; background: #111; z-index: 9999; transition: 0.4s; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .cart-drawer.active { right: 0; }
        #contact-section .card { transition: 0.3s; cursor: default; }
        #contact-section .card:hover { transform: translateY(-10px); border-color: #00bcd4; }
    </style>
</head>
<body>

    <div id="cartOverlay" class="cart-overlay" onclick="UI.toggleCart(false)"></div>

    <header class="header">
        <div class="logo"><img src="logo-main.png" alt="فكرة" style="height: 45px;"></div>
        <nav class="nav-group">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>الرئيسية</span></a>
            <a href="#contact-section" class="nav-link"><i class="fas fa-phone-alt"></i><span>تواصل معنا</span></a>
            <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
                <span>السلة</span>
            </div>
        </nav>
    </header>

    <main id="productsGrid" class="grid"></main>

    <section id="contact-section" style="padding: 60px 5%; background: #0a0a0a; border-top: 1px solid #222;">
        <h2 style="text-align: center; color: #00bcd4; margin-bottom: 40px; font-size: 2rem;">تواصل معنا</h2>
        <div class="grid">
            <div class="card" style="padding: 30px; text-align: center;">
                <i class="fab fa-whatsapp" style="font-size: 3.5rem; color: #25d366; margin-bottom: 15px;"></i>
                <h3>واتساب</h3>
                <p style="color: #888; margin-bottom: 20px;">أرسل ملفاتك واستفساراتك مباشرة</p>
                <a href="https://wa.me/201111049778" class="btn-main" style="margin: 0 auto; width: fit-content; padding: 10px 30px;">مراسلة</a>
            </div>
            <div class="card" style="padding: 30px; text-align: center;">
                <i class="fas fa-phone-volume" style="font-size: 3.5rem; color: #00bcd4; margin-bottom: 15px;"></i>
                <h3>اتصال هاتفي</h3>
                <p style="color: #888; margin-bottom: 20px;">متاحون للرد على مكالماتكم</p>
                <a href="tel:01111049778" class="btn-main" style="margin: 0 auto; width: fit-content; padding: 10px 30px;">اتصل الآن</a>
            </div>
            <div class="card" style="padding: 30px; text-align: center;">
                <i class="fas fa-map-marked-alt" style="font-size: 3.5rem; color: #ff4444; margin-bottom: 15px;"></i>
                <h3>موقعنا</h3>
                <p style="color: #888; margin-bottom: 20px;">حلوان، القاهرة - تشرفنا بزيارتك</p>
                <a href="https://maps.google.com" target="_blank" class="btn-main" style="margin: 0 auto; width: fit-content; padding: 10px 30px;">الموقع</a>
            </div>
        </div>
    </section>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header" style="padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0; color:#fff;">سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="cursor:pointer; color:#fff; font-size: 2.5rem;">&times;</span>
        </div>
        <div id="cartItemsList" style="padding: 15px; overflow-y: auto; flex: 1;"></div>
        <div style="padding: 20px; border-top: 1px solid #333;">
            <button onclick="window.location.href='checkout.html'" class="btn-main" style="width: 100%; margin:0;">إتمام الطلب</button>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Cart.init();
            const grid = document.getElementById('productsGrid');
            if(grid && typeof Products !== 'undefined') {
                Object.keys(Products).forEach(key => {
                    const p = Products[key];
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-img-container" style="background:#fff; height:220px; display:flex; align-items:center; justify-content:center;">
                                <img src="${p.images[0]}" style="max-height:100%; max-width:90%;">
                            </div>
                            <h3>${p.name}</h3>
                            <a href="product-details.html?type=${key}" class="btn-main">اطلب الآن</a>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
