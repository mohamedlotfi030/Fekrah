<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | حلوان</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="assets/images/logo-main.png" alt="فكرة" style="height: 45px; cursor: pointer;" onclick="location.reload()">
        </div>
        
        <nav class="nav-group">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="tel:01275209778" class="nav-link"><i class="fas fa-phone-alt"></i> <span>اتصل بنا</span></a>
            
            <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
            </div>
        </nav>
    </header>

    <main id="productsGrid" class="grid">
        </main>

    <footer class="fixed-footer">
        <a href="tel:01275209778" class="footer-item"><i class="fas fa-phone-alt"></i><span>اتصال</span></a>
        <a href="https://wa.me/201275209778" class="footer-item"><i class="fab fa-whatsapp"></i><span>واتساب</span></a>
        <a href="mailto:fekra.adv.eg@gmail.com" class="footer-item"><i class="fas fa-envelope"></i><span>الإيميل</span></a>
        <a href="https://maps.google.com/?q=Helwan" target="_blank" class="footer-item"><i class="fas fa-map-marker-alt"></i><span>حلوان</span></a>
    </footer>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <h3><i class="fas fa-shopping-basket"></i> سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="font-size: 2rem; cursor: pointer;">&times;</span>
        </div>
        
        <div id="cartItemsList" class="drawer-body">
            </div>

        <div class="drawer-footer">
            <button onclick="window.location.href='cart.html'" class="btn-main" style="width: 100%;">إتمام الطلب</button>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. تهيئة السلة
            Cart.init();

            // 2. رندرة المنتجات من قاعدة البيانات
            const grid = document.getElementById('productsGrid');
            Object.keys(Products).forEach(key => {
                const p = Products[key];
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img-container">
                            <img src="${p.images[0]}" alt="${p.name}">
                        </div>
                        <h3>${p.name}</h3>
                        <a href="product.html?type=${key}" class="btn-main">اطلب الآن</a>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
