<!DOCTYPE html>

<body>

    <header class="main-header">

                <a href="product-details.html?type=rollup" class="order-btn">اطلب الآن</a>

            <img src="mug.jpg" alt="مج">
            <div class="card-content">

                <a href="product-details.html?type=mug" class="order-btn">اطلب الآن</a>
            </div>

    <footer id="contact" class="contact-section">
        <h2>تواصل معنا</h2>
