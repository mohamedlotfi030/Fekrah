    <style>
        /* إضافة بسيطة لضمان عمل الـ Badge */
        .cart-badge {
            background: #fff;
            color: #000;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            position: absolute;
            top: -10px;
            right: -10px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 15px;
            height: 15px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="logo-main.png" alt="فكرة للدعاية والإعلان" style="height: 45px; cursor: pointer;" onclick="location.reload()">
        </div>
        
        <nav class="nav-group">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="tel:01275209778" class="nav-link"><i class="fas fa-phone-alt"></i> <span>اتصل بنا</span></a>
            
            <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
            </div>
        </nav>
    </header>

    <main id="productsGrid" class="grid">
        </main>

    <footer class="fixed-footer">
        <a href="tel:01275209778" class="footer-item">
            <i class="fas fa-phone-alt"></i>
            <span>اتصال</span>
        </a>
        <a href="https://wa.me/201275209778" class="footer-item">
            <i class="fab fa-whatsapp"></i>
            <span>واتساب</span>
        </a>
        <a href="mailto:fekra.adv.eg@gmail.com" class="footer-item">
            <i class="fas fa-envelope"></i>
            <span>الإيميل</span>
        </a>
        <a href="https://maps.google.com/?q=حلوان" target="_blank" class="footer-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>موقعنا</span>
        </a>
    </footer>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <h3><i class="fas fa-shopping-basket"></i> سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="font-size: 2.5rem; cursor: pointer; color: var(--primary);">&times;</span>
        </div>
        
        <div id="cartItemsList" class="drawer-body">
            </div>

        <div class="drawer-footer">
            <button onclick="window.location.href='product-details.html'" class="btn-main" style="width: 100%; margin-bottom: 10px;">عرض التفاصيل</button>
            <p style="text-align: center; font-size: 0.8rem; color: #666;">سيتم تحويلك لتأكيد البيانات عبر الواتساب</p>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. تهيئة نظام السلة
            if (typeof Cart !== 'undefined') {
                Cart.init();
            }

            // 2. عرض المنتجات من قاعدة البيانات (Products)
            const grid = document.getElementById('productsGrid');
            if (grid && typeof Products !== 'undefined') {
                Object.keys(Products).forEach(key => {
                    const p = Products[key];
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-img-container" style="background:#fff; height:200px; display:flex; align-items:center; justify-content:center; padding:10px;">
                                <img src="${p.images[0]}" alt="${p.name}" style="max-height:100%; max-width:100%; object-fit:contain;">
                            </div>
                            <div style="padding:15px;">
                                <h3 style="margin:0 0 15px 0; font-size:1.1rem;">${p.name}</h3>
                                <a href="product-details.html?type=${key}" class="btn-main" style="text-decoration:none; display:inline-block; width:100%; box-sizing:border-box;">اطلب الآن</a>
                            </div>
                        </div>
                    `;
                });
            } else {
                console.error("لم يتم العثور على ملف products.js أو الـ Grid");
            }
        });
    </script>
</body>
