<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo"><img src="logo-main.png"></div>
        <div class="cart-icon" onclick="toggleCart(true)" style="cursor:pointer; position:relative;">
            <i class="fas fa-shopping-cart" style="font-size:1.5rem;"></i>
            <span id="cartBadge" class="badge" style="position:absolute; top:-10px; right:-10px; background:var(--primary); color:black; border-radius:50%; padding:2px 7px; font-size:0.8rem; font-weight:bold; display:none;">0</span>
        </div>
    </header>

    <section class="grid">
        <div class="card">
            <div class="card-img-container"><img src="tshirt-main.png"></div>
            <div class="card-details" style="padding:20px; text-align:center;">
                <h3>تيشيرتات</h3>
                <a href="product-details.html?type=tshirt" class="btn" style="text-decoration:none; display:block;">اطلب الآن</a>
            </div>
        </div>
        <div class="card">
            <div class="card-img-container"><img src="rollup-1.jpg"></div>
            <div class="card-details" style="padding:20px; text-align:center;">
                <h3>رول أب</h3>
                <a href="product-details.html?type=rollup" class="btn" style="text-decoration:none; display:block;">اطلب الآن</a>
            </div>
        </div>
        </section>

    <div id="sidebar" class="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>سلة الطلبات</h2>
            <span onclick="toggleCart(false)" style="cursor:pointer; font-size:2rem;">&times;</span>
        </div>
        <div id="cartItemsList"></div>
        <div id="checkoutFormContainer" style="display:none;">
            <input type="text" id="userName" placeholder="الاسم الكامل">
            <input type="tel" id="userPhone" placeholder="رقم الهاتف">
            <textarea id="userNotes" placeholder="عنوانك أو ملاحظات إضافية"></textarea>
            <button id="sheetBtn" onclick="submitToSheet()" class="btn">إرسال الطلب</button>
            <button onclick="submitToWhatsApp()" class="btn" style="background:#25d366; margin-top:10px;"><i class="fab fa-whatsapp"></i> واتساب</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>window.onload = updateBadge;</script>
</body>
</html>
