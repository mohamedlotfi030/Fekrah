<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان | Fekrah Advertising</title>
    <link rel="stylesheet" href="style.css">
    <!-- الخطوط العريضة والمميزة -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <a href="#" class="logo">
                <img src="logo.png.png" alt="فكرة للدعاية والإعلان" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="#home">الرئيسية</a></li>
                <li><a href="#services">خدماتنا</a></li>
                <li><a href="#contact">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- قسم الترحيب مع معالجة الخلفية -->
        <section class="hero" id="home">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>فكرة للدعاية والإعلان</h1>
                <p>من الخيال إلى الواقع.. خدمات إعلانية متكاملة</p>
                <a href="#services" class="cta-button">ابدأ مشروعك الآن</a>
            </div>
        </section>

        <!-- قسم الخدمات المتوهجة والقابلة للضغط -->
        <section id="services">
            <div class="section-title"><h2>خدماتنا</h2></div>
            <div class="services-grid">
                <a href="#contact" class="service-card">
                    <i class="fas fa-paint-brush"></i>
                    <h3>التصميم الجرافيكي</h3>
                    <p>هوية بصرية مميزة تعبر عن عملك.</p>
                </a>
                <a href="#contact" class="service-card">
                    <i class="fas fa-store"></i>
                    <h3>اللافتات الخارجية</h3>
                    <p>تنفيذ اللافتات باحترافية وأجود الخامات.</p>
                </a>
                <a href="#contact" class="service-card">
                    <i class="fas fa-print"></i>
                    <h3>خدمات الطباعة</h3>
                    <p>طباعة الكتالوجات والمطبوعات الورقية.</p>
                </a>
            </div>
        </section>
    </main>

    <a href="https://wa.me/201111049778" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        // سكربت بسيط لضمان سلاسة التنقل بين الأقسام
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
