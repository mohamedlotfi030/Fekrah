<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكرة للدعاية والإعلان</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo"><img src="logo-main.png" style="height:45px; cursor:pointer;" onclick="location.reload()"></div>
        <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
        </div>
    </header>

    <main id="productsGrid" class="grid"></main>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header"><h3>سلة الطلبات</h3><span onclick="UI.toggleCart(false)" style="cursor:pointer; font-size:2rem;">×</span></div>
        <div id="cartItemsList" class="drawer-body"></div>
        <div class="drawer-footer">
            <button onclick="window.location.href='checkout.html'" class="btn-main" style="width: 100%;">إتمام الطلب</button>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Cart.init();
            const grid = document.getElementById('productsGrid');
            Object.keys(Products).forEach(key => {
                const p = Products[key];
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img-container" style="background:white; height:220px; display:flex; align-items:center; justify-content:center;">
                            <img src="${p.images[0]}" style="max-height:100%; max-width:90%;">
                        </div>
                        <h3>${p.name}</h3>
                        <a href="product-details.html?type=${key}" class="btn-main">اطلب الآن</a>
                    </div>`;
            });
            // هنا لا يوجد استدعاء للـ Slideshow لتبقى ثابتة
        });
    </script>
</body>
</html>
