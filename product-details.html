<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تخصيص المنتج | فكرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 100px;">
    <header class="header">
        <div class="logo"><img src="logo.png.png" alt="Fekrah"></div>
        <nav class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="gallery.html">المعرض</a>
            <a href="#contact">تواصل معنا</a>
        </nav>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </header>

    <div style="display: flex; gap: 40px; padding: 0 10%; flex-wrap: wrap;">
        <div style="flex: 1;">
            <img id="pImg" src="" style="width:100%; border-radius:15px;">
        </div>
        <div style="flex: 1;">
            <h1 id="pTitle" style="color:var(--primary)"></h1>
            <p id="pDesc" style="color:#aaa; margin-bottom:15px;">هذا المنتج قابل للتخصيص حسب المقاسات وخيارات الطباعة.</p>
            <div style="background:var(--card); padding:25px; border-radius:15px;">
                <label>المقاسات المعتمدة</label>
                <select id="sizeSelect" onchange="changeImage(this.value)" 
                        style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff; border:1px solid #444;"></select>
                
                <label>خيارات الطباعة والتجهيز</label>
                <select id="optSelect" style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff; border:1px solid #444;"></select>
                
                <label>ملاحظات إضافية (مثل الأبعاد أو تفاصيل خاصة)</label>
                <textarea id="custNotes" 
                          style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff; border:1px solid #444; border-radius:8px;">
                </textarea>
                
                <button onclick="add()" class="btn" style="width:100%; margin-top:20px;">إضافة للسلة</button>
            </div>
        </div>
    </div>

    <!-- Sidebar للسلة -->
    <div class="cart-sidebar" id="cartSidebar">
        <h2 style="color:var(--primary)">سلة المشتريات</h2>
        <div id="cartList"></div>
        <hr>
        <button onclick="closeCart()" class="btn" style="width:100%; background:#333; color:white;">إغلاق</button>
    </div>

    <!-- Toast -->
    <div class="toast">تمت إضافة المنتج للسلة</div>

    <script>
        const config = {
            'tshirt': { name: 'التيشيرتات', img: 'T-shirt.png', sizes: ['S','M','L','XL','XXL','XXXL'], opts: ['DTF حراري','تطريز كمبيوتر'] },
            'bcard': { name: 'الكروت الشخصية', img: 'B-card.jpg', sizes: ['9x5 سم'], opts: ['كوشيه - وجه واحد','كوشيه - وجهين','فيرانو','سلوفان مط','سلوفان لامع'] },
            'rollup': { name: 'الرول أب', img: 'roll-up.jpg', sizes: ['80x200','100x200'], opts: ['إن دور عالية الجودة','لامينشن مط','لامينشن لامع'] },
            'mug': { name: 'المج (الكوب)', img: 'mug.jpg', sizes: ['11 أونصة'], opts: ['يد قلب','سحري','ملون من الداخل'] },
            'xbanr': { name: 'اكس بانر', img: 'X-banr.png', sizes: ['60x160','80x180'], opts: ['خامات مستوردة'] },
            'bloknote': { name: 'البلوك نوت', img: 'bloknote.png', sizes: ['A4','A5','A6'], opts: ['تجليد علوي','تجليد جانبي'] },
            'popup': { name: 'البوب أب كونتر', img: 'pop-up-counter.png', sizes: ['80 سم'], opts: ['هيكل ألمنيوم + لمنيشن'] },
            'banar': { name: 'البانر', img: 'banar.png', sizes: ['مقاس حر'], opts: ['أوت دور'] }
        };

        const type = new URLSearchParams(window.location.search).get('type');
        const p = config[type];
        document.getElementById('pTitle').innerText = p.name;
        document.getElementById('pImg').src = p.img;
        p.sizes.forEach(s => document.getElementById('sizeSelect').innerHTML += `<option>${s}</option>`);
        p.opts.forEach(o => document.getElementById('optSelect').innerHTML += `<option>${o}</option>`);

        function changeImage(option) {
            const img = document.getElementById('pImg');
            img.classList.add('fade');
            setTimeout(() => {
                img.src = p.img; // يمكن لاحقًا ربط صور مختلفة حسب الخيار
                img.classList.remove('fade');
            }, 300);
        }

        function add() {
            let cart = JSON.parse(localStorage.getItem('fekra_cart')) || [];
            cart.push({
                name: p.name,
                size: document.getElementById('sizeSelect').value,
                opt: document.getElementById('optSelect').value,
                notes: document.getElementById('custNotes').value
            });
            localStorage.setItem('fekra_cart', JSON.stringify(cart));
            document.getElementById('cartBadge').innerText = cart.length;

            // فتح السلة
            document.getElementById('cartSidebar').classList.add('open');
            const list = document.getElementById('cartList');
            list.innerHTML = cart.map((i, idx) => 
                `<div class="cart-item">
                    <span>${i.name} - ${i.size} - ${i.opt}</span>
                    <button onclick="del(${idx})" style="color:red; background:none; border:none;">حذف</button>
                </div>`
            ).join('');

            // Toast
            const toast = document.querySelector('.toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }
        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
        }
        function del(i) {
            let cart = JSON.parse(localStorage.getItem('fekra_cart')) || [];
            cart.splice(i,1);
            localStorage.setItem('fekra_cart', JSON.stringify(cart));
            location.reload();
        }
    </script>
</body>
</html>
