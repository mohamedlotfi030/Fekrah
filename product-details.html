<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | فكرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo"><img src="logo.png.png"></div>
        <nav class="nav-links"><a href="index.html">الرئيسية</a></nav>
        <div class="cart-icon" onclick="window.location.href='index.html'">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </header>

    <div class="product-container">
        <div class="gallery-box"><img id="pImg" src=""></div>
        <div class="details-box">
            <h1 id="pTitle"></h1>
            <div class="select-group">
                <label>المقاس:</label>
                <select id="pSize"></select>
            </div>
            <div class="select-group">
                <label>الخامة:</label>
                <select id="pOpt"></select>
            </div>
            <div class="select-group">
                <label>ملاحظات التصميم:</label>
                <textarea id="pNotes" placeholder="اكتب ملاحظاتك هنا..."></textarea>
            </div>
            <button onclick="addToCart()" class="btn">إضافة للسلة</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>document.addEventListener('DOMContentLoaded', loadProductDetails);</script>
</body>
</html>
