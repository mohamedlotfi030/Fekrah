<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلب منتج | فكرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 100px;">

    <header class="main-header">
        <div class="logo"><img src="logo.png.png" alt="فكرة"></div>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="gallery.html">المعرض</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-container" style="display: flex; gap: 50px; padding: 0 10%;">
        <div style="flex: 1;">
            <img id="mainImg" src="" style="width: 100%; border-radius: 20px; border: 1px solid #333;">
        </div>

        <div style="flex: 1;">
            <h1 id="pTitle" style="font-size: 2.5rem; margin-bottom: 10px;"></h1>
            <p id="dynamic-offer" style="color: var(--primary); font-weight: bold;"></p>

            <div class="order-form-card">
                <form id="orderForm">
                    <label class="form-label">المقاس المطلوب</label>
                    <select id="sizeSelect" name="size" class="custom-input"></select>

                    <label class="form-label">نوع الطباعة</label>
                    <select id="printType" name="print_type" class="custom-input">
                        <option>DTF - طباعة حرارية</option>
                        <option>تطريز كمبيوتر</option>
                        <option>سبليميشن</option>
                    </select>

                    <label class="form-label">الكمية</label>
                    <input type="number" name="qty" value="1" class="custom-input">

                    <button type="submit" class="submit-btn">إرسال الطلب (Google Sheets)</button>
                    <button type="button" onclick="toWhatsApp()" style="background: #25d366; color: white; margin-top: 10px;" class="submit-btn">طلب سريع عبر واتساب</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const products = {
            'tshirt': { title: 'تيشيرت مخصص', img: 'T-shirt.png', sizes: ['S','M','L','XL','XXL'] },
            'bcard': { title: 'كروت شخصية', img: 'B-card.jpg', sizes: ['وجه واحد','وجهين'] },
            'rollup': { title: 'رول أب', img: 'roll-up.jpg', sizes: ['80x200','100x200'] }
        };

        function load() {
            const type = new URLSearchParams(window.location.search).get('type') || 'tshirt';
            const data = products[type];
            document.getElementById('pTitle').innerText = data.title;
            document.getElementById('mainImg').src = data.img;
            document.getElementById('dynamic-offer').innerText = `عرض خاص على ${data.title} متاح الآن!`;
            
            const select = document.getElementById('sizeSelect');
            data.sizes.forEach(s => select.innerHTML += `<option>${s}</option>`);
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            // ضع هنا رابط الـ Apps Script الخاص بك
            fetch('YOUR_GAS_URL', { method: 'POST', body: new FormData(form) })
            .then(() => alert('تم تسجيل طلبك!'));
        };

        function toWhatsApp() {
            window.open(`https://wa.me/201000000000?text=أريد طلب ${document.getElementById('pTitle').innerText}`);
        }
        window.onload = load;
    </script>
</body>
</html>
