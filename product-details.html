<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | فكرة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-container { display: flex; flex-wrap: wrap; gap: 40px; padding: 120px 8% 50px; align-items: flex-start; }
        .gallery-box { flex: 1; min-width: 300px; background: white; border-radius: 20px; overflow: hidden; position: relative; height: 450px; display: flex; align-items: center; justify-content: center; border: 2px solid #222; }
        #pImg { max-width: 90%; max-height: 90%; object-fit: contain; transition: opacity 0.6s ease-in-out; }
        .details-box { flex: 1; min-width: 300px; }
        .price-tag { font-size: 1.5rem; color: var(--primary); margin: 15px 0; font-weight: bold; }
        .select-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><img src="logo.png.png"></div>
        <nav class="nav-links">
            <a href="index.html">الرئيسية</a>
        </nav>
        <div class="cart-icon" onclick="window.location.href='index.html?openCart=true'">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </header>

    <div class="product-container">
        <div class="gallery-box">
            <img id="pImg" src="" alt="عرض المنتج">
        </div>

        <div class="details-box">
            <h1 id="pTitle" style="color: var(--primary); font-size: 2.2rem;"></h1>
            <p id="pDesc" style="color: #888; line-height: 1.6;"></p>
            
            <div class="price-tag">اطلب الآن وحدد المواصفات</div>

            <div class="select-group">
                <label>المقاس / الحجم</label>
                <select id="pSize"></select>
            </div>

            <div class="select-group">
                <label>نوع الطباعة / الخامة</label>
                <select id="pOpt"></select>
            </div>

            <button onclick="addToCart()" class="btn" style="width: 100%; font-size: 1.2rem; padding: 15px;">
                إضافة للسلة <i class="fas fa-cart-plus"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // تشغيل التحميل عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
</body>
</html>
