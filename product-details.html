<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تخصيص المنتج | فكرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 100px;">
    <header class="main-header">
        <div class="logo"><img src="logo.png.png"></div>
        <nav><a href="index.html" style="color:white; text-decoration:none;">العودة للمتجر</a></nav>
    </header>

    <div style="display: flex; gap: 40px; padding: 0 10%; flex-wrap: wrap;">
        <div style="flex: 1;"><img id="mainImg" src="" style="width: 100%; border-radius: 20px; border: 1px solid #333;"></div>
        <div style="flex: 1;">
            <h1 id="pTitle" style="color: var(--primary);"></h1>
            <div style="background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333;">
                <label>المقاس المعتمد</label>
                <select id="sizeSelect"></select>
                
                <label>خيارات التنفيذ والطباعة</label>
                <select id="optionSelect"></select>
                
                <button onclick="addToCart()" class="btn-order" style="width: 100%; margin-top: 20px;">إضافة للسلة</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            'tshirt': { title: 'التيشيرتات', img: 'T-shirt.png', sizes: ['S','M','L','XL','XXL','XXXL'], options: ['طباعة DTF', 'تطريز مخصص'] },
            'bcard': { title: 'الكروت الشخصية', img: 'B-card.jpg', sizes: ['9x5 سم ستاندرد'], options: ['كوشيه - وجه واحد', 'كوشيه - وجهين', 'فيرانو فاخر', 'كريستال', 'سلوفان مط', 'سلوفان لامع', 'قص زوايا كريف'] },
            'rollup': { title: 'الرول أب', img: 'roll-up.jpg', sizes: ['80x200','85x200','100x200','120x200'], options: ['طباعة إن دور عالية الجودة', 'جالوسي + لامينشن مط', 'جالوسي + لامينشن لامع'] },
            'xbanr': { title: 'اكس بانر', img: 'X-banr.png', sizes: ['60x160 سم', '80x180 سم'], options: ['طباعة بانر خامات مستوردة'] },
            'mug': { title: 'المج (الكوب)', img: 'mug.jpg', sizes: ['11 أونصة ستاندرد'], options: ['سحري', 'يد قلب', 'ملون من الداخل أحمر', 'ملون من الداخل ألوان أخرى'] },
            'bloknote': { title: 'البلوك نوت', img: 'bloknote.png', sizes: ['A4','A5','A6'], options: ['تجليد علوي - ألوان', 'تجليد جانبي - ألوان', 'تجليد جانبي - أسود'] },
            'popup': { title: 'البوب أب كونتر', img: 'pop-up-counter.png', sizes: ['طاولة 80 سم'], options: ['جرافيك مخصص + لمنيشن حماية'] },
            'banar': { title: 'البانر', img: 'banar.png', sizes: ['مقاس حر (يحدد في الملاحظات)'], options: ['بنر مط أوت دور'] }
        };

        const type = new URLSearchParams(window.location.search).get('type');
        const p = config[type];

        if(p) {
            document.getElementById('pTitle').innerText = p.title;
            document.getElementById('mainImg').src = p.img;
            p.sizes.forEach(s => document.getElementById('sizeSelect').innerHTML += `<option>${s}</option>`);
            p.options.forEach(o => document.getElementById('optionSelect').innerHTML += `<option>${o}</option>`);
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('fekra_cart')) || [];
            cart.push({
                name: p.title,
                size: document.getElementById('sizeSelect').value,
                option: document.getElementById('optionSelect').value
            });
            localStorage.setItem('fekra_cart', JSON.stringify(cart));
            alert('تمت إضافة ' + p.title + ' إلى السلة');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
