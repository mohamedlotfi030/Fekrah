<div class="product-container">
    <div class="product-images">
        <img id="mainProductImg" src="" alt="صورة المنتج">
        <div id="imageThumbs" class="thumbnails"></div>
    </div>

    <div class="product-info">
        <h1 id="productTitle"></h1>
        
        <div class="order-box">
            <form id="orderForm">
                <label>المقاس / النوع</label>
                <select id="sizeSelect" name="size" class="input-field"></select>

                <label>نوع الطباعة</label>
                <select id="printType" name="print_type" class="input-field">
                    <option value="DTF">DTF - طباعة حرارية</option>
                    <option value="Embroidery">تطريز كمبيوتر</option>
                    <option value="Sublimation">سبليميشن</option>
                </select>

                <label>الكمية</label>
                <input type="number" name="quantity" value="1" class="input-field">

                <button type="submit" class="submit-btn">إرسال الطلب للمراجعة</button>
                <button type="button" class="whatsapp-btn" onclick="sendWhatsApp()">طلب عبر واتساب</button>
            </form>
        </div>
    </div>
</div>

<script>
    // البيانات الفعلية بناءً على ملفات GitHub الخاصة بك
    const products = {
        'tshirt': {
            title: 'تيشيرت مخصص',
            images: ['T-shirt.png', 'T-shirt-1.png'],
            sizes: ['S', 'M', 'L', 'XL', 'XXL']
        },
        'bcard': {
            title: 'كروت شخصية',
            images: ['B-card.jpg', 'B-card2.jpg'],
            sizes: ['وجه واحد', 'وجهين - مطفي', 'وجهين - لامع']
        }
    };

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'tshirt';
        const data = products[type];

        document.getElementById('productTitle').innerText = data.title;
        document.getElementById('mainProductImg').src = data.images[0];

        // تعبئة المقاسات
        const sizeSelect = document.getElementById('sizeSelect');
        data.sizes.forEach(s => {
            sizeSelect.innerHTML += `<option value="${s}">${s}</option>`;
        });
    }

    // ربط الفورم بـ Google Apps Script
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const scriptURL = 'ضع_رابط_السكريبت_الخاص_بك_هنا';
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
            .then(res => alert('تم استلام طلبك بنجاح!'))
            .catch(err => alert('حدث خطأ، حاول مرة أخرى'));
    };

    window.onload = init;
</script>
