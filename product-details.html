<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | فكرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body style="background: #000; color:white; padding-bottom: 50px;">

    <div id="cartOverlay" class="cart-overlay" onclick="UI.toggleCart(false)"></div>

    <header class="header">
        <div class="logo">
            <img src="logo-main.png" alt="فكرة" style="height:40px; cursor:pointer;" onclick="location.href='index.html'">
        </div>
        <nav class="nav-group">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <div onclick="UI.toggleCart(true)" style="cursor:pointer; position:relative;" class="nav-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
                <span>السلة</span>
            </div>
        </nav>
    </header>

    <div class="product-container" id="productView" style="display:flex; flex-wrap:wrap; gap:30px; padding:40px 5%;">
        <div style="flex:1; min-width:300px; background:white; border-radius:15px; padding:20px; display:flex; justify-content:center; align-items:center; overflow:hidden; height:400px; border: 1px solid #333;">
            <img id="mainPImg" src="" style="max-width:100%; max-height:100%; object-fit:contain; transition: opacity 0.4s ease-in-out;">
        </div>

        <div style="flex:1; min-width:300px;">
            <h1 id="pName" style="color:#00bcd4; margin-bottom:20px; font-size: 2rem;">تحميل...</h1>
            
            <div class="selection-group">
                <label style="display:block; margin-bottom:10px; color:#aaa;">المقاس / الحجم:</label>
                <select id="pSize" class="input-field" style="margin-bottom:20px;"></select>

                <label style="display:block; margin-bottom:10px; color:#aaa;">نوع الخامة / الطباعة:</label>
                <select id="pOpt" class="input-field" style="margin-bottom:20px;"></select>

                <label style="display:block; margin-bottom:10px; color:#aaa;">ملاحظاتك (اختياري):</label>
                <textarea id="pNotes" placeholder="أضف أي تفاصيل أخرى تريدها هنا..." class="input-field" style="height:100px; resize:none;"></textarea>
            </div>

            <button id="addBtn" class="btn-main" style="width:100%; margin: 30px 0 10px; padding:18px; font-size:1.1rem;">إضافة إلى السلة</button>
            <button onclick="location.href='index.html'" style="width:100%; background:transparent; color:#888; border:1px solid #333; padding:12px; border-radius:8px; cursor:pointer; transition:0.3s;">العودة للمتجر</button>
        </div>
    </div>

    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <h3 style="margin:0; color:#fff;">سلة الطلبات</h3>
            <span onclick="UI.toggleCart(false)" style="cursor:pointer; color:#fff; font-size: 2.5rem;">×</span>
        </div>
        <div id="cartItemsList" style="padding: 15px; overflow-y: auto; flex: 1;"></div>
        <div style="padding: 20px; border-top: 1px solid #333;">
            <button onclick="window.location.href='checkout.html'" class="btn-main" style="width: 100%; margin:0;">إتمام الطلب</button>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // تهيئة السلة
            if(typeof Cart !== 'undefined') Cart.init();
            
            // جلب نوع المنتج من الرابط
            const urlParams = new URLSearchParams(window.location.search);
            const productType = urlParams.get('type');
            const product = Products[productType];

            if (product) {
                document.getElementById('pName').innerText = product.name;
                document.getElementById('mainPImg').src = product.images[0];
                
                // ملء المقاسات
                const sizeSelect = document.getElementById('pSize');
                product.options.sizes.forEach(s => sizeSelect.innerHTML += `<option value="${s}">${s}</option>`);

                // ملء الأنواع
                const optSelect = document.getElementById('pOpt');
                product.options.types.forEach(t => optSelect.innerHTML += `<option value="${t}">${t}</option>`);

                // تشغيل حركة الصور التلقائية
                if(typeof UI !== 'undefined' && UI.startProductSlideshow) {
                    UI.startProductSlideshow(productType);
                }

                // زر الإضافة للسلة
                document.getElementById('addBtn').onclick = () => {
                    const size = document.getElementById('pSize').value;
                    const opt = document.getElementById('pOpt').value;
                    Cart.add(productType, size, opt);
                    UI.toggleCart(true); // فتح السلة تلقائياً عند الإضافة
                };
            } else {
                document.getElementById('productView').innerHTML = '<h2 style="text-align:center; width:100%; margin-top:100px;">المنتج غير موجود</h2>';
            }
        });
    </script>
</body>
</html>
