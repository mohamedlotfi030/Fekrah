<div class="product-options">
    <h1 id="productTitle">اسم المنتج</h1>
    
    <div id="dynamic-offer" class="offer-banner">
        </div>

    <div class="order-form-container">
        <form id="googleOrderForm">
            <div class="input-group">
                <label>اختر المقاس</label>
                <select id="sizeSelect" name="size">
                    </select>
            </div>

            <div class="input-group" id="printTypeGroup">
                <label>نوع الطباعة</label>
                <select id="printType" name="print_type">
                    <option value="DTF">طباعة دي تي إف (DTF)</option>
                    <option value="Sublimation">سبليميشن (Sublimation)</option>
                    <option value="Vinyl">فينيل حراري</option>
                    <option value="Embroidery">تطريز كمبيوتر</option>
                </select>
            </div>

            <div class="input-group">
                <label>الكمية المطلوبة</label>
                <input type="number" name="quantity" value="1" min="1">
            </div>

            <div class="btn-group">
                <button type="button" class="whatsapp-order" onclick="sendWhatsApp()">
                    <i class="fab fa-whatsapp"></i> استفسار سريع
                </button>
                <button type="submit" class="submit-order" style="background:var(--primary-color); color:black; padding:15px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">
                    تأكيد طلبك الآن
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // ربط الفورم بجوجل ابس سكريبت (استبدل الرابط برابطك)
    const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';
    const form = document.getElementById('googleOrderForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => alert('تم استلام طلبك بنجاح، سنتواصل معك قريباً!'))
          .catch(error => console.error('Error!', error.message));
    });

    // تحديث خيارات المنتج بناءً على النوع
    function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'tshirt';
        const data = productData[type];

        document.getElementById('productTitle').innerText = data.title;
        
        // إظهار/إخفاء نوع الطباعة (للكروت والمجات مثلاً تختلف الأنواع)
        const printGroup = document.getElementById('printTypeGroup');
        if (type === 'bcard') {
            printGroup.innerHTML = '<label>نوع الورق</label><select name="print_type"><option>كوشيه 350 جرام</option><option>فبريانو</option></select>';
        }

        // تحميل المقاسات
        const sizeSelect = document.getElementById('sizeSelect');
        sizeSelect.innerHTML = '';
        data.sizes.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.innerText = s;
            sizeSelect.appendChild(opt);
        });
    }
    window.onload = loadProduct;
</script>
