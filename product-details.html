<script>
    const productData = {
        'tshirt': {
            title: 'تيشيرت مخصص',
            offerName: 'التيشيرتات',
            images: ['T-shirt.png', 'T-shirt-1.png', 'T-shirt-2.png', 'T-shirt-3.png'],
            sizes: ['سبعة', 'دائري', 'بولو']
        },
        'bcard': {
            title: 'كروت شخصية',
            offerName: 'الكروت الشخصية',
            // تم تعديلها لتصبح .jpg و .png حسب ملفاتك في GitHub
            images: ['B-card.jpg', 'B-card2.jpg', 'B-card3.png'],
            sizes: ['وجه واحد', 'وجهين']
        },
        'rollup': {
            title: 'رول أب إعلاني',
            offerName: 'الرول أب',
            images: ['roll-up.jpg', 'Roll-up-2.jpg', 'Roll-up-3.jpg'],
            sizes: ['80x200 سم', '100x200 سم']
        },
        'mug': {
            title: 'مج حراري',
            offerName: 'المجات',
            images: ['mug.jpg', 'Mug-2.jpg', 'Mug-3.jpg'],
            sizes: ['عادي', 'يد قلب']
        }
    };

    function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'tshirt';
        const data = productData[type];

        if(!data) return;

        document.getElementById('productTitle').innerText = data.title;
        document.getElementById('dynamic-offer').innerText = `لمعرفة العروض المقدمة على ${data.offerName}، يرجى التواصل عبر الواتساب.`;
        
        // تحميل الصور
        const mainImg = document.getElementById('mainProductImg');
        mainImg.src = data.images[0];
        
        const thumbs = document.getElementById('imageThumbs');
        thumbs.innerHTML = ''; // تنظيف الصور القديمة
        data.images.forEach(img => {
            const imgTag = document.createElement('img');
            imgTag.src = img;
            imgTag.onclick = () => mainImg.src = img;
            thumbs.appendChild(imgTag);
        });

        // تحميل المقاسات
        const select = document.getElementById('sizeSelect');
        select.innerHTML = '';
        data.sizes.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.innerText = s;
            select.appendChild(opt);
        });
    }

    function sendWhatsApp() {
        const title = document.getElementById('productTitle').innerText;
        const size = document.getElementById('sizeSelect').value;
        const msg = `أهلاً فكرة، أريد الاستفسار عن عروض ${title} مقاس ${size}`;
        window.open(`https://wa.me/201000000000?text=${encodeURIComponent(msg)}`);
    }

    window.onload = loadProduct;
</script>
